app = "nba-game-processor"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# Two process groups: "api" serves HTTP, "processor" consumes the Redis stream.
# They share the same Docker image but run different commands.
# REDIS_URL is set via `fly secrets set` — never put credentials in fly.toml.
[processes]
  api = "uvicorn src.api:app --host 0.0.0.0 --port 8000"
  processor = "python -m src.processor"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["api"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[env]
  PORT = "8000"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
  processes = ["api"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
  processes = ["processor"]
