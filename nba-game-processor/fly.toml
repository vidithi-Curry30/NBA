app = "nba-game-processor"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  # WHY /health as the health check path: it's a lightweight endpoint that
  # returns 200 without Redis dependency, so Fly.io doesn't mistake a cold
  # Redis connection for an unhealthy app instance.
  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[env]
  PORT = "8000"

# WHY set REDIS_URL via fly secrets, not fly.toml:
# fly.toml is committed to git; secrets are stored encrypted in Fly.io's
# vault and injected at runtime. Never put credentials in version control.
# Run: fly secrets set REDIS_URL=redis://...

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
