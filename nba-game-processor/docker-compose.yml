version: "3.9"

services:
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    # WHY named volume: data persists across `docker-compose down` / restart.
    # Without it, all stream events and game state are lost on container stop —
    # fine for development but not for a demo that runs across multiple sessions.
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    # WHY depends_on with condition: ensures Redis is healthy before the API
    # starts, so the startup health check in api.py actually verifies a live
    # connection rather than always failing on first launch.
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./src:/app/src

volumes:
  redis_data:
