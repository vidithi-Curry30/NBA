name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    # WHY working-directory here and not in individual steps: setting it at
    # the job level means pytest finds pytest.ini and all src/ imports resolve
    # correctly regardless of where the repo root is. Omitting it would cause
    # pytest to run from the repo root, miss pytest.ini, and fail on
    # `import src.state` since src/ wouldn't be on sys.path.
    defaults:
      run:
        working-directory: nba-game-processor

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # WHY no Redis service container: all tests mock Redis at the client
      # level. Running a real Redis in CI would make tests slower and introduce
      # flakiness from network timing — mocking is strictly better for unit tests.
      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          REDIS_URL: redis://localhost:6379
          NBA_API_DELAY: "3"
